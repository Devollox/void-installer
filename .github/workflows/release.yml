name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check if release already exists for this tag
        id: check_release
        shell: bash
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/checkout@v4

      - name: Setup Go
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.check_release.outputs.exists == 'false'
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        if: steps.check_release.outputs.exists == 'false'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app (Windows)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          wails build -clean -platform windows/amd64 -verbose

      - name: Upload Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Void Presence Installer.exe
          body_path: RELEASE_NOTES.md
          tag_name: ${{ github.ref_name }}
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release description from RELEASE_NOTES.md
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release edit ${{ github.ref_name }} --notes-file RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
